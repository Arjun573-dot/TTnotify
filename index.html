<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="Aerobin.jpg">
    <title>TTnotify</title>

</head> 
<body>
    <h2>TT notify</h2>
    <table border="1" cellpadding="10">
        <tr align="center">
            <th width="100">Monday</th>
            <th width="100">Tuesday</th>
            <th width="100">Wednesday</th>
            <th width="100">Thursday</th>
            <th width="100">Friday</th>
        </tr>
        <tr align="center">
            <td><input type="text" data-day="monday" data-index="0" placeholder="Subject"></input></td>
            <td><input type="text" data-day="tuesday" data-index="0" placeholder="Subject"></input></td>
            <td><input type="text" data-day="wednesday" data-index="0" placeholder="Subject"></input></td>
            <td><input type="text" data-day="thursday" data-index="0" placeholder="Subject"></input></td>
            <td><input type="text" data-day="friday" data-index="0" placeholder="Subject"></input></td>
        </tr>
        <tr align="center">
            <td><input type="text" data-day="monday" data-index="1" placeholder="Subject"></input></td>
            <td><input type="text" data-day="tuesday" data-index="1" placeholder="Subject"></input></td>
            <td><input type="text" data-day="wednesday" data-index="1" placeholder="Subject"></input></td>
            <td><input type="text" data-day="thursday" data-index="1" placeholder="Subject"></input></td>
            <td><input type="text" data-day="friday" data-index="1" placeholder="Subject"></input></td>
        </tr>
        <tr align="center">
            <td><input type="text" data-day="monday" data-index="2" placeholder="Subject"></input></td>
            <td><input type="text" data-day="tuesday" data-index="2" placeholder="Subject"></input></td>
            <td><input type="text" data-day="wednesday" data-index="2" placeholder="Subject"></input></td>
            <td><input type="text" data-day="thursday" data-index="2" placeholder="Subject"></input></td>
            <td><input type="text" data-day="friday" data-index="2" placeholder="Subject"></input></td>
        </tr>
        <tr align="center">
            <td><input type="text" data-day="monday" data-index="3" placeholder="Subject"></input></td>
            <td><input type="text" data-day="tuesday" data-index="3" placeholder="Subject"></input></td>
            <td><input type="text" data-day="wednesday" data-index="3" placeholder="Subject"></input></td>
            <td><input type="text" data-day="thursday" data-index="3" placeholder="Subject"></input></td>
            <td><input type="text" data-day="friday" data-index="3" placeholder="Subject"></input></td>
        </tr>
        <tr align="center">
            <td><input type="text" data-day="monday" data-index="4" placeholder="Subject"></input></td>
            <td><input type="text" data-day="tuesday" data-index="4" placeholder="Subject"></input></td>
            <td><input type="text" data-day="wednesday" data-index="4" placeholder="Subject"></input></td>
            <td><input type="text" data-day="thursday" data-index="4" placeholder="Subject"></input></td>
            <td><input type="text" data-day="friday" data-index="4" placeholder="Subject"></input></td>
        </tr>
    </table>
<script src="script.js"></script>
</body>
</html>
